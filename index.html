    var socS=1-Math.min(1,Math.abs((ua.soc||0)-(d.soc||0))/5);
    var voiS=1-Math.min(1,Math.abs((ua.voi||0)-(d.voi||0))/5);
    var carS=1-Math.min(1,Math.abs((ua.car||0)-(d.car||0))/5);
    var memS=1-Math.min(1,Math.abs((ua.mem||0)-(d.mem||0))/5);
    var patS=1-Math.min(1,Math.abs((ua.pat||0)-3)/3);
    var nozS=(ua.noz||0)>=(d.noz||0)?1:(ua.noz||0)/Math.max(0.1,d.noz||0.1);
    var groS=(ua.gro||0)>=(d.gro||0)?1:(ua.gro||0)/Math.max(0.1,d.gro||0.1);
    var budS=(ua.bud||0)>=(d.bud||0)?1:(ua.bud||0)/Math.max(0.1,d.bud||0.1);
    var total=(actS*0.12+socS*0.2+voiS*0.08+carS*0.1+memS*0.15+patS*0.1+nozS*0.05+groS*0.1+budS*0.1)*100;
    return{total:Math.round(total*10)/10,cat:cat};
  });
  catScores.sort(function(a,b){return b.total-a.total;});
  var top3=catScores.slice(0,3);
  _s("rTitle").textContent=top3[0].cat.name;
  _s("rSub").textContent="般适合："+((top3[0].cat.suitable||"").substring(0,50))+"...";
  var BL=["极低","低","中等","中高","高"];
  var BW=["20%","40%","60%","75%","90%","100%"];
  var CW=["20%","40%","60%","80%","100%"];
  var rankingEl=_s("catRanking");rankingEl.innerHTML="";
  top3.forEach(function(item,idx){
    var cat=item.cat,rank=idx+1,pct=Math.round(item.total);
    var card=document.createElement("div");
    card.className="rank-card rank-"+rank;
    var dimData=[
      ["活泼度",String(cat.active||0)+"%","#E8701A"],
      ["话痨度",String(cat.vocal||0)+"%","#FF6B9D"],
      ["粘人度",String(cat.affection||0)+"%","#FF9E5E"],
      ["打理需求",String(cat.grooming||0)+"%","#4A9E5C"],
      ["预算",BL[cat.budget||0]||"中等","#5B8BD4"],
      ["儿童友好",String(cat.child||0)+"星","#FFB347"]
    ];
    var dimHtml="";
    dimData.forEach(function(di){
      var w=di[0]==="预算"?BW[cat.budget||0]:di[0]==="儿童友好"?CW[cat.child||0]:di[1];
      dimHtml+="<div class=dim-item><div class=dim-lbl>"+di[0]+"</div><div class=dim-bar-bg><div class=dim-bar-fill style=\"background:"+di[2]+";width:"+w+"\"></div></div></div>";
    });
    var tagsHtml="";
    (cat.traits||[]).forEach(function(t){tagsHtml+="<span class=detail-tag>"+t+"</span>";});
    card.innerHTML="<div class=rank-header><div class=rank-badge>"+rank+"</div><div class=rank-info><div class=rank-cat-name>"+cat.emoji+" "+cat.name+"</div><div class=rank-cat-origin>"+cat.origin+"</div></div><div class=rank-score-row><div><div class=rank-score>"+pct+"<span style=\"font-size:13px;font-weight:400;color:var(--text-dim)\">%</span></div><div class=rank-pct>匹配度</div></div><div class=expand-icon>\u25BC</div></div></div><div class=score-bar-bg><div class=score-bar-fill style=\"width:0%\"></div></div><div class=rank-detail><div class=detail-tags>"+tagsHtml+"</div><div class=detail-section><div class=detail-section-title>&#x1F43E; 性格特点</div><div class=detail-section-content>"+(cat.personality||"")+"</div></div><div class=detail-section><div class=detail-section-title>&#x1F3E0; 适合环境</div><div class=detail-section-content>"+(cat.suitable||"")+"</div></div><div class=detail-section><div class=detail-section-title>&#x1F421; 养护建议</div><div class=detail-section-content>"+(cat.tips||"")+"</div></div><div class=rank-dim-grid>"+dimHtml+"</div></div>";
    card.addEventListener("click",function(){card.classList.toggle("expanded");});
    rankingEl.appendChild(card);
    setTimeout(function(){var bar=card.querySelector(".score-bar-fill");if(bar)bar.style.width=pct+"%";},300+idx*150);
  });
}
function restart(){
  showPage("startPage");
  _s("pFill").style.width="0%";
  _s("pLbl").textContent="0 / "+TOTAL+" 题";
  dimRanges.forEach(function(r){var el=_s(r[0]);if(el)el.classList.remove("active","done");});
}
_s("startBtn").addEventListener("click",startTest);
_s("prevBtn").addEventListener("click",prevQ);
_s("restartBtn").addEventListener("click",restart);
buildPawBg();
</script>
</body>
</html>
